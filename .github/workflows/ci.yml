name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev --group dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Coverage gate
        run: |
          uv run python -m coverage run --source=ai_assist -m pytest -p no:xdist -o addopts="-v --strict-markers --tb=short"
          uv run python -m coverage report --fail-under=71
