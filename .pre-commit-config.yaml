# Pre-commit hooks for ai-assist
# See https://pre-commit.com for more information

repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Python code formatting with black
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=120']

  # Import sorting handled by ruff (faster, includes isort)
  # - repo: https://github.com/pycqa/isort
  #   rev: 5.13.2
  #   hooks:
  #     - id: isort
  #       args: ['--profile=black', '--line-length=120']

  # Python linting with ruff (includes isort, flake8, pyupgrade)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: ['--fix', '--line-length=120']

  # Security linting with bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  # Check local links in markdown files
  - repo: local
    hooks:
      - id: check-markdown-links
        name: check-markdown-links
        entry: uv run python scripts/check_markdown_links.py
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # Type checking with mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy ai_assist/
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # Duplicate code detection with pylint
  - repo: local
    hooks:
      - id: pylint-similarities
        name: pylint-similarities
        entry: uv run pylint --disable=all --enable=similarities --min-similarity-lines=5 ai_assist/
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

  # Run tests with pytest (parallel) and coverage report (warning only; gate via make test-cov or CI).
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'uv run pytest --cov=ai_assist --cov-report=term --cov-fail-under=0 && uv run python -m coverage report --fail-under=71'
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
